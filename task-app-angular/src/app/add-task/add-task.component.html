<div class="bg-white p-6 rounded-2x1 shadow-md mb-6">
    <h2 class="text-x1 font-semibold mb-4"> Add Task</h2>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="space-y-4">

    <!-- Title -->
     <div>
        <label class="blockmb-1 font-medium">Title:</label>
        <input 
            type="text"
            formControlName="title"
            class="w-full px-4 py-2 border rounded-x1 focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="Enter task title"
            />
            <div *ngIf="taskForm.get('title')?.invalid && taskForm.get('title')?.touched"
            class="text-rewd-500 text-sm mt-1">
                Title is required
            </div>
     </div>

     <!-- Description -->
      <div>
        <label class="block mb-1 font-medium">Description</label>
        <textarea 
            formControlName="description"
            class="w-full px-4 py-2 border rounded-x1 focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="Enter task description"
        ></textarea>
      </div>

      <!-- Submit Button -->
       <button
       type="submit"
       [disabled]="taskForm.invalid"
       class="bg-blue-500 text-white px-2 rounded-xl hover:bg-blue-600 disabled:opacity-50 transition"
       >
        Add Task
       </button>
    </form>
</div>
